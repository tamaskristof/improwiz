name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      # The ~32 MB Salamander samples aren't committed (see .gitignore), so fetch them before the
      # build or the deployed site serves 404s for every sample and falls back to the synth.
      # Cached across runs; fetch-samples skips files already on disk.
      - uses: actions/cache@v4
        with:
          path: public/salamander
          key: salamander-${{ hashFiles('scripts/fetch-samples.mjs') }}
      - run: npm run fetch-samples
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
